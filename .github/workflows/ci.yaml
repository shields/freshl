name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-
      - run: rustup toolchain install stable --profile minimal --component clippy --component rustfmt
      - run: make lint PRETTIER='npx --yes prettier'
      - run: make test

  coverage:
    runs-on: ubuntu-24.04
    # Pinned: newer nightlies have triggered llvm-cov "mismatched data"
    # warnings that drop profile data for some functions, producing phantom
    # uncovered lines. Bump this date deliberately after verifying coverage
    # still reports 100%.
    env:
      NIGHTLY: nightly-2026-04-12
      # Bumping CARGO_LLVM_COV_VERSION invalidates the binary cache so the new
      # version is installed; otherwise a hit skips the install step.
      CARGO_LLVM_COV_VERSION: 0.8.7
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cargo/bin/cargo-llvm-cov
          key: cargo-llvm-cov-${{ runner.os }}-${{ env.CARGO_LLVM_COV_VERSION }}
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-coverage-
      - run: rustup toolchain install $NIGHTLY --profile minimal --component llvm-tools-preview
      - run: command -v cargo-llvm-cov || cargo install cargo-llvm-cov --locked --version $CARGO_LLVM_COV_VERSION
      - run: make coverage NIGHTLY=$NIGHTLY
