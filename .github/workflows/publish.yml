name: publish

on:
  # crates.io Trusted Publishing rejects the `workflow_run` trigger, so this
  # can't gate on CI completion. Use branch protection on `main` so CI must
  # pass before a commit reaches this trigger.
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - run: rustup toolchain install stable --profile minimal
      - run: cargo install gitcalver --locked
      - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: auth
      - run: make publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
