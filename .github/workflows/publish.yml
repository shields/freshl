name: publish

on:
  # crates.io Trusted Publishing rejects the `workflow_run` trigger, so this
  # can't gate on CI completion. Use branch protection on `main` so CI must
  # pass before a commit reaches this trigger.
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  publish:
    name: publish
    runs-on: ubuntu-24.04
    environment: release
    permissions:
      contents: read
      id-token: write # OIDC token for crates.io Trusted Publishing
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - run: rustup toolchain install stable --profile minimal
      - run: cargo install gitcalver --locked
      - uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
        id: auth
      - run: make publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
